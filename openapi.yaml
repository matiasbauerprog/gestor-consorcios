# ===========================================================================
# COMPONENTS
# ===========================================================================

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Autenticación mediante token JWT en el header Authorization.

  responses:

    PedidoInvalido:
      description: El pedido es inválido o le faltan campos requeridos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NoAutenticado:
      description: No se proporcionó token de autenticación o es inválido.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    AccesoDenegado:
      description: El rol del usuario no tiene permisos para acceder al recurso.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NoEncontrado:
      description: El recurso solicitado no existe.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    PayloadGrande:
      description: Archivo demasiado grande.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    Error:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          description: Descripción legible del error.
          examples: ["No tiene permisos para acceder a este recurso."]

    # ---------------------------- Auth ------------------------------------

    LoginIn:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          minLength: 3
          maxLength: 255
          examples: ["admin@consorcio.local"]
        password:
          type: string
          minLength: 1
          maxLength: 255
          format: password

    CambiarPasswordIn:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          minLength: 1
          maxLength: 255
          format: password
          description: Contraseña actual del usuario (para confirmar identidad).
        new_password:
          type: string
          minLength: 8
          maxLength: 255
          format: password
          description: Nueva contraseña a establecer. Mínimo 8 caracteres.

    TokenOut:
      type: object
      required: [access_token, token_type, expires_in, user]
      properties:
        access_token:
          type: string
          description: JWT firmado con HS256.
        token_type:
          type: string
          enum: [bearer]
        expires_in:
          type: integer
          format: int32
          description: Segundos hasta el vencimiento del token.
        user:
          $ref: '#/components/schemas/UsuarioOut'

    UsuarioOut:
      type: object
      required: [id, email, rol]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        rol:
          type: string
          enum: [administracion, representante, departamento]
        departamento_id:
          type: integer
          format: int64
          nullable: true
          description: Solo presente para usuarios con rol `departamento`.

    # ---------------------------- Expensas --------------------------------

    Expensa:
      type: object
      required: [id, departamento_id, periodo, monto, estado]
      properties:
        id:
          type: integer
          format: int64
        departamento_id:
          type: integer
          format: int64
          description: Unidad funcional a la que se asocia la expensa.
        periodo:
          type: string
          description: Período de la expensa (YYYY-MM).
          examples: ["2026-05"]
        monto:
          type: number
          format: double
          examples: [85230.50]
        estado:
          type: string
          enum: [pendiente, pagada, vencida]
        fecha_vencimiento:
          type: string
          format: date
        ultimo_comprobante:
          description: Comprobante más reciente asociado, o null si no hay.
          oneOf:
            - $ref: '#/components/schemas/Comprobante'
            - type: 'null'

    ExpensaCrear:
      type: object
      required: [departamento_id, periodo, monto, fecha_vencimiento]
      properties:
        departamento_id:
          type: integer
          format: int64
          minimum: 1
        periodo:
          type: string
          pattern: '^\d{4}-(0[1-9]|1[0-2])$'
          examples: ["2026-05"]
        monto:
          type: number
          format: double
          exclusiveMinimum: 0
        fecha_vencimiento:
          type: string
          format: date

    ExpensaResumen:
      type: object
      description: Resumen mínimo de una expensa para embeber en comprobantes.
      properties:
        departamento_id:
          type: integer
          format: int64
        periodo:
          type: string
          pattern: '^\d{4}-(0[1-9]|1[0-2])$'
        monto:
          type: number
          format: double
      required:
        - departamento_id
        - periodo
        - monto

    Comprobante:
      type: object
      required: [id, expensa_id, fecha_pago, monto, estado]
      properties:
        id:
          type: integer
          format: int64
        expensa_id:
          type: integer
          format: int64
        fecha_pago:
          type: string
          format: date
        monto:
          type: number
          format: double
        archivo_path:
          type: string
          description: URL pública relativa de la imagen (`/uploads/comprobantes/<uuid>.<ext>`) o `null` si no se adjuntó archivo.
          nullable: true
        estado:
          type: string
          enum: [pendiente_verificacion, aprobado, rechazado]
        expensa:
          description: Resumen de la expensa asociada (departamento, período, monto).
          oneOf:
            - $ref: '#/components/schemas/ExpensaResumen'
            - type: 'null'

    ComprobanteActualizar:
      type: object
      required: [estado]
      properties:
        estado:
          type: string
          enum: [aprobado, rechazado]
          description: Decisión final sobre el comprobante.

    # ---------------------------- Tareas ----------------------------------

    Peticion:
      type: object
      required: [id, departamento_id, titulo, descripcion, estado, fecha_creacion]
      properties:
        id:
          type: integer
          format: int64
        departamento_id:
          type: integer
          format: int64
        titulo:
          type: string
        descripcion:
          type: string
        estado:
          type: string
          enum: [abierta, convertida_en_trabajo, rechazada]
        fecha_creacion:
          type: string
          format: date-time

    PeticionCrear:
      type: object
      required: [titulo, descripcion]
      properties:
        titulo:
          type: string
        descripcion:
          type: string

    PeticionActualizar:
      type: object
      required: [estado]
      properties:
        estado:
          type: string
          enum: [rechazada]
          description: Único estado al que se puede transicionar manualmente.

    Trabajo:
      type: object
      required: [id, descripcion, estado, fecha_creacion]
      properties:
        id:
          type: integer
          format: int64
        peticion_id:
          type: integer
          format: int64
          nullable: true
          description: |
            Petición que originó el trabajo. Null si el trabajo se creó desde
            cero (sin petición previa).
        descripcion:
          type: string
        estado:
          type: string
          enum: [en_curso, finalizado, cancelado]
        fecha_creacion:
          type: string
          format: date-time

    TrabajoCrear:
      type: object
      required: [descripcion]
      properties:
        peticion_id:
          type: integer
          format: int64
          minimum: 1
          nullable: true
          description: |
            Petición que origina el trabajo. Si se omite o es null, el trabajo
            se crea "desde cero" sin petición asociada.
        descripcion:
          type: string

    TrabajoActualizar:
      type: object
      required: [estado]
      properties:
        estado:
          type: string
          enum: [finalizado, cancelado]
          description: Estado terminal al que se cierra el trabajo.

    Presupuesto:
      type: object
      required: [id, trabajo_id, proveedor, monto, estado, fecha_presentacion]
      properties:
